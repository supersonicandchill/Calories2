
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight + Calories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        table { border-collapse: collapse; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-xl mx-auto p-6">

        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-semibold tracking-tight">Calorie Tracker</h1>
            <div class="px-3 py-1 bg-zinc-900 rounded-2xl text-sm text-zinc-400 font-medium">Weight + Progressive Calories</div>
        </div>

        <!-- Daily Goal -->
        <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
            <div class="flex items-center justify-between mb-3">
                <label class="text-zinc-400 font-medium">Daily Calorie Goal</label>
                <span id="goalDisplay" class="text-emerald-400 font-semibold text-lg">2000 kcal</span>
            </div>
            <div class="flex gap-3">
                <input id="goalInput" type="number" value="2000" class="flex-1 bg-zinc-800 text-4xl font-semibold rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-center">
                <button onclick="saveGoal()" class="bg-white text-zinc-950 hover:bg-amber-300 font-semibold px-8 rounded-2xl transition-colors">SAVE</button>
            </div>
        </div>

        <!-- Log Section - NOW WITH PROGRESSIVE CALORIES -->
        <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
            <h2 class="text-xl font-medium mb-4 flex items-center gap-2">
                Log for <span id="logDateDisplay" class="text-emerald-400"></span>
                <input id="dateInput" type="date" onchange="loadSelectedDay()" class="ml-auto bg-transparent text-sm text-zinc-400 focus:outline-none">
            </h2>

            <!-- Weight (still once per day) -->
            <div class="mb-8">
                <label class="block text-xs font-medium text-zinc-400 mb-2">WEIGHT (lbs)</label>
                <input id="weightInput" type="number" step="0.1" placeholder="180.4" class="w-full bg-zinc-800 text-4xl font-semibold rounded-2xl px-6 py-5 text-center focus:outline-none">
            </div>

            <!-- Progressive Calories -->
            <div>
                <div class="flex justify-between items-baseline mb-3">
                    <label class="text-xs font-medium text-zinc-400">CALORIES THIS DAY (add as many times as you want)</label>
                    <div id="runningTotalDisplay" class="text-5xl font-semibold text-emerald-400">0</div>
                </div>

                <!-- Add new calorie entry -->
                <div class="flex gap-3 mb-4">
                    <input id="addAmount" type="number" placeholder="kcal" class="flex-1 bg-zinc-800 text-3xl font-semibold rounded-2xl px-6 py-4 focus:outline-none text-center">
                    <input id="addNote" type="text" placeholder="e.g. breakfast / shake" class="flex-1 bg-zinc-800 rounded-2xl px-6 py-4 focus:outline-none text-sm">
                    <button onclick="addCalorie()" class="bg-emerald-500 hover:bg-emerald-400 text-zinc-950 font-semibold px-8 rounded-2xl text-xl transition-colors">ADD</button>
                </div>

                <!-- Live list of today's calorie entries -->
                <div id="calorieList" class="max-h-56 overflow-auto bg-zinc-800/50 rounded-3xl p-2 mb-6 space-y-1 min-h-[120px]">
                    <!-- Populated by JS -->
                </div>

                <div class="flex gap-3">
                    <button onclick="saveDay()" class="flex-1 py-6 bg-emerald-500 hover:bg-emerald-400 text-xl font-semibold rounded-3xl text-zinc-950 transition-all active:scale-[0.98]">
                        SAVE DAY
                    </button>
                    <button onclick="clearCurrentDay()" class="px-8 py-6 bg-zinc-800 hover:bg-red-400 hover:text-white rounded-3xl text-sm font-medium transition-colors">CLEAR DAY</button>
                </div>
            </div>
        </div>

        <!-- Today's Summary Card (shows when today has data) -->
        <div id="summaryCard" class="hidden bg-gradient-to-br from-zinc-900 to-zinc-800 rounded-3xl p-6 mb-8 border border-emerald-900">
            <!-- Filled by JS -->
        </div>

        <!-- History -->
        <div class="mb-3 flex items-baseline justify-between">
            <h2 class="text-xl font-medium">History</h2>
            <button onclick="clearAllData()" class="text-xs text-red-400 hover:text-red-300 flex items-center gap-1">
                CLEAR ALL
            </button>
        </div>

        <div class="bg-zinc-900 rounded-3xl overflow-hidden">
            <table class="w-full">
                <thead>
                    <tr class="text-xs text-zinc-400 border-b border-zinc-800">
                        <th class="px-6 py-4 text-left font-medium">DATE</th>
                        <th class="px-6 py-4 text-right font-medium">WEIGHT</th>
                        <th class="px-6 py-4 text-right font-medium">CALORIES</th>
                        <th class="px-6 py-4 text-right font-medium">VS GOAL</th>
                    </tr>
                </thead>
                <tbody id="historyBody" class="text-sm divide-y divide-zinc-800">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>

        <p class="text-center text-zinc-500 text-xs mt-10">
            100% standalone • Saves in your browser • Progressive calories now enabled
        </p>
    </div>

    <script>
        let entries = [];
        let dailyGoal = 2000;
        let currentDate = '';
        let currentCalorieEntries = []; // array of {amount, note} for the day being edited

        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        function loadData() {
            const saved = localStorage.getItem('recompTrackerEntriesV2');
            if (saved) {
                entries = JSON.parse(saved);
                entries.sort((a, b) => b.date.localeCompare(a.date));
            }
            const savedGoal = localStorage.getItem('recompTrackerGoal');
            if (savedGoal) dailyGoal = parseInt(savedGoal);
            document.getElementById('goalInput').value = dailyGoal;
            document.getElementById('goalDisplay').textContent = dailyGoal + ' kcal';
        }

        function saveData() {
            localStorage.setItem('recompTrackerEntriesV2', JSON.stringify(entries));
        }

        function saveGoal() {
            const input = parseInt(document.getElementById('goalInput').value);
            if (input > 0) {
                dailyGoal = input;
                localStorage.setItem('recompTrackerGoal', dailyGoal);
                document.getElementById('goalDisplay').textContent = dailyGoal + ' kcal';
                renderHistory();
            }
        }

        function loadSelectedDay() {
            currentDate = document.getElementById('dateInput').value;
            document.getElementById('logDateDisplay').textContent = currentDate;

            const existing = entries.find(e => e.date === currentDate);
            if (existing) {
                document.getElementById('weightInput').value = existing.weight || '';
                currentCalorieEntries = JSON.parse(JSON.stringify(existing.calorieEntries || []));
            } else {
                document.getElementById('weightInput').value = '';
                currentCalorieEntries = [];
            }
            renderCalorieList();
        }

        function renderCalorieList() {
            const container = document.getElementById('calorieList');
            container.innerHTML = '';

            let total = currentCalorieEntries.reduce((sum, item) => sum + item.amount, 0);
            document.getElementById('runningTotalDisplay').textContent = total;

            if (currentCalorieEntries.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-zinc-400 text-sm">Add calories above — they will sum automatically</div>`;
                return;
            }

            currentCalorieEntries.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'flex items-center justify-between bg-zinc-800 rounded-2xl px-4 py-3';
                row.innerHTML = `
                    <div class="flex-1 text-sm">${item.note || '—'}</div>
                    <div class="font-semibold text-lg">${item.amount}</div>
                    <button onclick="deleteCalorieEntry(${index}); event.stopImmediatePropagation();" class="ml-4 text-red-400 text-2xl leading-none hover:text-red-300">×</button>
                `;
                container.appendChild(row);
            });
        }

        function addCalorie() {
            const amountInput = document.getElementById('addAmount');
            const noteInput = document.getElementById('addNote');
            const amount = parseInt(amountInput.value);

            if (!amount || amount <= 0) {
                alert('Enter a positive calorie amount');
                return;
            }

            currentCalorieEntries.push({
                amount: amount,
                note: noteInput.value.trim()
            });

            amountInput.value = '';
            noteInput.value = '';
            renderCalorieList();
        }

        function deleteCalorieEntry(index) {
            currentCalorieEntries.splice(index, 1);
            renderCalorieList();
        }

        function saveDay() {
            if (!currentDate) return;

            const weightStr = document.getElementById('weightInput').value.trim();
            if (!weightStr) {
                alert('Please enter your weight for the day');
                return;
            }

            const weight = parseFloat(weightStr);

            const dayIndex = entries.findIndex(e => e.date === currentDate);

            const dayData = {
                date: currentDate,
                weight: weight,
                calorieEntries: [...currentCalorieEntries]
            };

            if (dayIndex >= 0) {
                entries[dayIndex] = dayData;
            } else {
                entries.push(dayData);
            }

            entries.sort((a, b) => b.date.localeCompare(a.date));
            saveData();
            renderHistory();

            alert(`✅ Saved for ${currentDate}`);

            if (currentDate === getToday()) {
                showTodaySummary();
            }
        }

        function getTotalCalories(day) {
            if (!day.calorieEntries) return 0;
            return day.calorieEntries.reduce((sum, item) => sum + item.amount, 0);
        }

        function renderHistory() {
            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = '';

            if (entries.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-12 text-center text-zinc-400">No entries yet.<br><span class="text-xs">Log your first day above ↑</span></td></tr>`;
                return;
            }

            entries.forEach(entry => {
                const totalCals = getTotalCalories(entry);
                const diff = dailyGoal - totalCals;
                const diffHTML = diff >= 0 
                    ? `<span class="text-emerald-400 font-medium">–${diff}</span>` 
                    : `<span class="text-red-400 font-medium">+${Math.abs(diff)}</span>`;

                const row = document.createElement('tr');
                row.className = 'hover:bg-zinc-800 cursor-pointer transition-colors';
                row.onclick = () => showSummary(entry.date);
                row.innerHTML = `
                    <td class="px-6 py-4 font-medium">${entry.date}</td>
                    <td class="px-6 py-4 text-right font-semibold">${entry.weight}</td>
                    <td class="px-6 py-4 text-right font-semibold">${totalCals}</td>
                    <td class="px-6 py-4 text-right">${diffHTML}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function showSummary(date) {
            const entry = entries.find(e => e.date === date);
            if (!entry) return;

            const totalCals = getTotalCalories(entry);
            const card = document.getElementById('summaryCard');
            card.classList.remove('hidden');

            let breakdownHTML = '';
            if (entry.calorieEntries && entry.calorieEntries.length > 0) {
                breakdownHTML = `<div class="mt-6 text-xs font-medium text-zinc-400 mb-2">CALORIE BREAKDOWN</div>`;
                entry.calorieEntries.forEach(item => {
                    breakdownHTML += `
                        <div class="flex justify-between text-sm py-1 border-b border-zinc-700 last:border-none">
                            <span>${item.note || '—'}</span>
                            <span class="font-semibold">${item.amount} kcal</span>
                        </div>`;
                });
            }

            card.innerHTML = `
                <div class="flex justify-between items-baseline mb-4">
                    <h3 class="font-medium text-lg">${date}</h3>
                    <span onclick="hideSummary()" class="text-zinc-400 cursor-pointer text-sm">✕</span>
                </div>
                <div class="flex justify-between mb-8">
                    <div>
                        <div class="text-amber-400 text-5xl font-semibold">${entry.weight}</div>
                        <div class="text-xs text-zinc-400">WEIGHT • lbs</div>
                    </div>
                    <div class="text-right">
                        <div class="text-5xl font-semibold">${totalCals}</div>
                        <div class="text-xs text-zinc-400">TOTAL CALORIES</div>
                    </div>
                </div>
                ${breakdownHTML}
                <div class="mt-8 pt-4 border-t border-zinc-700 flex justify-between items-center">
                    <div class="${dailyGoal - totalCals >= 0 ? 'text-emerald-400' : 'text-red-400'}">
                        <div class="text-6xl font-bold">${dailyGoal - totalCals >= 0 ? '–' : '+'}${Math.abs(dailyGoal - totalCals)}</div>
                        <div class="text-xs tracking-widest">${dailyGoal - totalCals >= 0 ? 'UNDER GOAL' : 'OVER GOAL'}</div>
                    </div>
                </div>
            `;
        }

        function showTodaySummary() {
            showSummary(getToday());
        }

        function hideSummary() {
            document.getElementById('summaryCard').classList.add('hidden');
        }

        function clearCurrentDay() {
            if (confirm('Clear all calories and weight for this day?')) {
                currentCalorieEntries = [];
                document.getElementById('weightInput').value = '';
                renderCalorieList();
            }
        }

        function clearAllData() {
            if (confirm('Delete ALL saved data permanently?')) {
                localStorage.removeItem('recompTrackerEntriesV2');
                localStorage.removeItem('recompTrackerGoal');
                entries = [];
                dailyGoal = 2000;
                document.getElementById('goalInput').value = 2000;
                document.getElementById('goalDisplay').textContent = '2000 kcal';
                renderHistory();
                hideSummary();
                alert('Everything cleared.');
            }
        }

        // Start the app
        window.onload = function () {
            loadData();
            // Set date to today
            const today = getToday();
            document.getElementById('dateInput').value = today;
            currentDate = today;
            document.getElementById('logDateDisplay').textContent = today;

            // Load today's data if it exists
            loadSelectedDay();

            renderHistory();

            // If today already has data, show summary
            const todayEntry = entries.find(e => e.date === today);
            if (todayEntry) {
                showTodaySummary();
            }
        };
    </script>
</body>
</html>
